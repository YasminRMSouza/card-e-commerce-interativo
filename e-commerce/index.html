<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Tênis</title>
    <link rel="stylesheet" href="/components/style.css">
</head>
<body>
    <main>
        <article class="product-card">
            <!-- imagem do card -->
            <figure class="product-carousel">
                <div class="carousel-track">
                    <div class="carousel-slide">
                        <img src="/assets/image/adventurre-graphite-cyan.png" alt="Tênis Esportivo Robusto Cinza Chumbo e Turquesa">
                    </div>
                    <div class="carousel-slide">
                        <img src="/assets/image/adventurre-graphite-cyan2.png" alt="Tênis Esportivo Robusto Cinza Chumbo e Turquesa">
                    </div>
                </div>

                <div class="carousel-dots">
                <span class="dot active"></span>
                <span class="dot"></span>
                </div>
            </figure>

            <!-- descrição do card -->
            <div class="card-content">
                <h2 class="card-title">Tênis Esportivo Robusto Cinza Chumbo e Turquesa</h2>
                <p class="card-description">Conforto e amortecimento para sua corrida diária.</p>
                <span class="card-price">R$ 499,99</span>

                <!-- seletor do tamanho (card de vestimenta)-->
                <div class="size-selector">
                    <p class="selector-label">Selecione o tamanho:</p>
                    <div class="size-buttons">
                        <button class="size-btn">37</button>
                        <button class="size-btn">38</button>
                        <button class="size-btn">39</button>
                        <button class="size-btn">40</button>
                        <button class="size-btn">41</button>
                        <button class="size-btn">42</button>
                        <button class="size-btn">43</button>
                        <button class="size-btn">44</button>
                    </div>
                </div>

                <!-- seletor de quantidade-->
                <div class="purchase-actions">
                    <div class="quantity-selector">
                        <span class="selector-label">Quantidade</span>
                        <div class="quantity-controls">
                            <button class="quantity-btn" aria-label="Diminuir quantidade">-</button>
                            <span class="quantity-display">1</span>
                            <button class="quantity-btn" aria-label="Aumentar quantidade">+</button>
                        </div>
                    </div>

                    <!-- adicionar ao carrinho-->
                    <button class="add-to-cart-btn">
                        Adicionar ao Carrinho
                    </button>
                </div>
            </div>
        </article>
    </main>

    <div class="modal-overlay" id="successModal">
        <div class="modal-content">
            <h3 class="modal-title">🎉 Sucesso!</h3>
            <p class="modal-message" id="modalText"></p>

            <div class="modal-actions">
                <button class="modal-btn-primary" id="buyNowModalBtn">Comprar agora</button>
                <button class="modal-btn-secondary" id="addToCartModalBtn">Adicionar ao carrinho</button>
            </div>
        </div>
    </div>

    <script src="/components/script.js"></script>
</body>
</html>
